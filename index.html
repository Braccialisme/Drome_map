<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drôme · Diois</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>

  <style>
    @font-face {
      font-family: 'VG5000';
      src: url('https://cdn.velvetyne.fr/fonts/vg5000/VG5000-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'VG5000';
      src: url('https://cdn.velvetyne.fr/fonts/vg5000/VG5000-Mezzo.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }
  </style>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --ink:          #1a1a1a;
      --ink-2:        #2c2c2c;

      /* Greige palette */
      --greige-0:     #f2efe7;
      --greige-1:     #e4e0d5;
      --greige-2:     #d0ccc0;
      --greige-3:     #b8b4a7;
      --greige-4:     #8a877c;

      /* Accents */
      --orange:       #cc6a3a;
      --orange-2:     #b8582a;
      --orange-glow:  rgba(204, 106, 58, 0.5);

      /* Layer accent hues */
      --hue-water:    #4a7ba3;
      --hue-relief:   #6b6355;
      --hue-heritage: #8b5a3a;
      --hue-food:     #cc6a3a;

      --dust:         rgba(26, 26, 26, 0.55);
      --dust-2:       rgba(26, 26, 26, 0.35);

      --radius:       3px;
      --radius-l:     6px;

      --font-ui:      'VG5000', system-ui, sans-serif;
      --font-mono:    'VG5000', 'JetBrains Mono', monospace;

      --panel-h:      42vh;
      --tab-w:        44px;
    }

    /* Mode nuit : palette charbon + crème */
    body.night {
      --ink:          #f2efe7;
      --ink-2:        #e4e0d5;
      --greige-0:     #2b2a27;
      --greige-1:     #232220;
      --greige-2:     #3a3833;
      --greige-3:     #4c483f;
      --greige-4:     #8a877c;
      --dust:         rgba(242,239,231,0.66);
      --dust-2:       rgba(242,239,231,0.4);
    }
    body.night .maplibregl-canvas { filter: brightness(0.9) contrast(0.95) saturate(0.85); }
    /* Textes codés en dur → crème en mode nuit */
    body.night .tab { color: rgba(242,239,231,0.82); }
    body.night .content-title, body.night .row-label { color: var(--ink); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--greige-1);
      font-family: var(--font-ui);
      color: var(--ink);
    }

    #map { position: absolute; inset: 0; background: #1a1e21; }
    .maplibregl-canvas {
      filter: brightness(1.06) contrast(0.94) saturate(0.88);
    }

    /* ── ÉCHELLE (petit rectangle noir bas droite, comme dans ton croquis) ── */
    #scale {
      position: absolute;
      bottom: calc(var(--panel-h) + 12px);
      right: 12px;
      background: var(--ink);
      color: var(--greige-0);
      padding: 5px 9px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      z-index: 10;
      pointer-events: none;
      border-radius: var(--radius);
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #scale .num {
      color: var(--orange);
    }

    /* ── CONTRÔLES HAUT-DROITE : boussole / géoloc / maison, sans fond ── */
    #compass {
      position: absolute; top: 12px; right: 12px;
      width: 42px; height: 42px;
      background: none; border: none; padding: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    #compass:active { transform: scale(0.94); }
    #compass-rose {
      display: block;
      transition: transform 0.2s linear;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.22));
    }

    #geolocate, #home-btn {
      position: absolute; right: 16px;
      width: 34px; height: 34px;
      background: none; border: none; padding: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18));
    }
    #geolocate { top: 62px; }
    #home-btn  { top: 104px; }
    #geolocate svg, #home-btn svg { display: block; }
    #geolocate.active svg { stroke: var(--orange); }
    #geolocate:active, #home-btn:active { transform: scale(0.9); }

    /* Panneau baissé : seule l'échelle suit (les boutons sont ancrés en haut) */
    body.panel-collapsed #scale { bottom: calc(40px + 12px); }

    /* Toast (fallback / messages) */
    #toast {
      position: absolute;
      top: 14px; left: 50%;
      transform: translate(-50%, -12px);
      background: var(--ink);
      color: var(--greige-0);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 8px 14px;
      border-radius: var(--radius-l);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      max-width: 80vw;
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* Splash / écran d'accueil (logo) */
    #splash {
      position: absolute; inset: 0;
      z-index: 100;
      background: var(--greige-0);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      transition: opacity 0.6s ease;
    }
    #splash img { width: min(56vw, 300px); height: auto; }
    #splash .splash-cap {
      font-family: var(--font-mono);
      font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--dust);
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    /* Profil altimétrique */
    #elev-box {
      position: absolute;
      left: 12px; bottom: calc(var(--panel-h) + 12px);
      width: 220px;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius-l);
      padding: 8px 10px 6px;
      z-index: 15;
      display: none;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #elev-box.show { display: block; }
    body.panel-collapsed #elev-box { bottom: calc(40px + 12px); }
    #elev-box .elev-stats {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.03em;
      color: var(--dust); margin-top: 4px;
    }
    #elev-box .elev-close {
      position: absolute; top: 4px; right: 8px;
      font-family: var(--font-mono); font-size: 14px; color: var(--dust); cursor: pointer;
    }

    /* ── PANEL BOTTOM = LE BLOC ── */
    #panel-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: var(--panel-h);
      z-index: 20;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #panel-wrap.collapsed {
      transform: translateY(calc(var(--panel-h) - 40px));
    }

    /* Poignée = languette de la fiche, en haut à gauche, avec chevron large */
    /* Poignée = slider hexa sur rail pointillé + flèche (croquis ggg) */
    .panel-handle {
      position: absolute;
      top: -25px;
      left: 14px;
      width: 74px;
      height: 26px;
      background: var(--greige-1);
      border: 1px solid var(--greige-2);
      border-bottom: none;
      border-radius: 13px 13px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .panel-handle svg {
      width: 60px; height: 20px;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* Panneau baissé : la flèche se retourne (pousser vers le haut = ouvrir) */
    #panel-wrap.collapsed .panel-handle svg { transform: scaleX(-1); }

    /* Le bloc lui-même */
    #panel {
      position: absolute;
      inset: 0;
      background: var(--greige-1);
      border-top: 1px solid var(--greige-2);
      box-shadow:
        0 -2px 14px rgba(0,0,0,0.05),
        0 1px 0 rgba(255,255,255,0.7) inset;
      display: flex;
      flex-direction: row;
    }

    /* Contenu principal du panel (gauche) */
    .panel-content {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px 16px 20px;
      background: var(--greige-1);
    }
    .panel-content::-webkit-scrollbar { width: 0; display: none; }
    .panel-content { scrollbar-width: none; }

    /* ── INTERCALAIRES DROITE ── */
    /* Colonne d'intercalaires = bord droit de la MÊME fiche (greige-1),
       pas des onglets rapportés à côté */
    .tabs-column {
      width: var(--tab-w);
      display: flex;
      flex-direction: column;
      background: var(--greige-1);
      padding-top: 12px;
      position: relative;
    }

    /* Chaque intercalaire = une feuille : corps + petit débord (sa tranche),
       avec surépaisseur 3D façon pièce plastique injectée. */
    .tab {
      position: relative;
      flex: 1 1 0;
      min-height: 0;
      background: var(--greige-1);
      border-bottom: 1px solid var(--greige-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 8px 4px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(26, 26, 26, 0.78);
      transition: all 0.2s;
      /* biseau : lumière en haut, ombre en bas = relief bombé */
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -1px 0 rgba(0,0,0,0.06);
    }
    .tab:last-child { border-bottom: none; }

    /* Débord = tranche de la feuille qui dépasse sur le contenu (surépaisseur) */
    .tab::before {
      content: '';
      position: absolute;
      left: -6px;
      top: 0; bottom: 0;
      width: 6px;
      background: var(--greige-1);
      border-radius: var(--radius) 0 0 var(--radius);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.4),
        -2px 0 4px rgba(0,0,0,0.10);
    }

    /* Feuille active = orange, débord plus marqué, relief accentué */
    .tab.active {
      background: var(--orange);
      color: var(--greige-0);
      z-index: 2;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 -1px 0 rgba(0,0,0,0.12),
        -3px 0 8px rgba(0,0,0,0.14);
    }
    .tab.active::before {
      left: -9px;
      width: 9px;
      background: var(--orange);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.3),
        -3px 0 6px rgba(0,0,0,0.16);
    }

    .tab:not(.active):hover { background: var(--greige-2); }
    .tab:not(.active):hover::before { background: var(--greige-2); }
    .tab:active { filter: brightness(0.96); }

    /* ── SEARCH BAR (dans le module fond ou global) ── */
    /* Barre de recherche compacte, coins prononcés */
    .search-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 58%;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: 9px;
      padding: 4px 9px;
      margin-bottom: 12px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 1px 3px rgba(0,0,0,0.06);
    }
    .search-row input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--ink);
    }
    .search-row input::placeholder { color: var(--dust-2); }
    .search-row .search-icon {
      width: 12px; height: 12px;
      border: 1.5px solid var(--dust);
      border-radius: 50%;
      position: relative;
    }
    .search-row .search-icon::after {
      content: '';
      position: absolute;
      right: -4px; bottom: -4px;
      width: 6px; height: 1.5px;
      background: var(--dust);
      transform: rotate(45deg);
    }

    .search-results {
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: none;
    }
    .search-results.visible { display: block; }
    .search-result {
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--greige-1);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: var(--greige-1); }

    /* ── CHECKBOX ROWS (à la Braun) ── */
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 4px;
      cursor: pointer;
      border-bottom: 1px solid var(--greige-2);
      transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    /* Options de fond de carte : pas de lignes de séparation */
    .row[data-basemap] { border-bottom: none; padding: 6px 4px; }
    .row:active { background: var(--greige-2); }

    /* Toggle hardware : carré greige, cercle dedans, ombre portée 3D */
    /* Toggle calme : socle carré greige + cylindre plat, chanfrein léger */
    .checkbox {
      width: 22px; height: 22px;
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      background: var(--greige-0);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.7) inset,
        0 -1px 0 rgba(0,0,0,0.06) inset,
        0 1px 2px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }
    .checkbox::after {
      content: '';
      width: 12px; height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffffff 0%, var(--greige-1) 22%, var(--greige-2) 100%);
      box-shadow:
        0 0 0 1.5px var(--greige-1),
        inset 0 -1px 1px rgba(0,0,0,0.10),
        0 1px 1px rgba(0,0,0,0.12);
      transition: background 0.15s;
    }
    .row.active .checkbox { border-color: var(--greige-3); }
    .row.active .checkbox::after {
      background: linear-gradient(180deg, #f6c09a 0%, var(--orange) 24%, var(--orange-2) 100%);
      box-shadow: 0 0 0 1.5px var(--greige-1), 0 0 4px var(--orange-glow);
    }
    .row:active .checkbox { transform: scale(0.95); }

    .row-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
      opacity: 0.92;
    }

    .drone-legend {
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin: 2px 0 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--ink-2);
    }
    .drone-legend .dl-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 2px 0;
    }
    .drone-legend .dl-sw {
      width: 12px; height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .drone-legend .dl-note {
      margin-top: 6px;
      color: var(--dust);
      line-height: 1.3;
      letter-spacing: 0;
      font-family: var(--font-ui);
      font-size: 11px;
    }
    .drone-legend .dl-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--greige-2);
    }
    .drone-legend .dl-slider input { flex: 1; }

    .gpx-block { border-top: 1px solid var(--greige-2); margin-top: 8px; padding-top: 10px; }
    .gpx-btn {
      display: block; width: 100%; text-align: center;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      padding: 8px 10px; margin-bottom: 6px;
      cursor: pointer;
      font-family: var(--font-ui); font-size: 13px;
      color: var(--ink);
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 2px 4px rgba(0,0,0,0.08);
    }
    .gpx-btn:active { transform: scale(0.98); }
    .gpx-clear { color: var(--orange-2); }
    .gpx-active { background: var(--orange); border-color: var(--orange-2); color: var(--greige-0); }

    .route-block { border-top: 1px solid var(--greige-2); margin-top: 8px; padding-top: 10px; }
    .route-field { margin-bottom: 6px; }
    .route-field input {
      width: 100%; box-sizing: border-box;
      background: var(--greige-0); border: 1px solid var(--greige-2); border-radius: var(--radius);
      padding: 7px 9px; font-family: var(--font-ui); font-size: 13px; color: var(--ink); outline: none;
    }
    .route-res { margin-top: 2px; }
    .route-modes { display: flex; gap: 4px; margin: 6px 0; }
    .route-modes button {
      flex: 1; padding: 6px 4px; cursor: pointer;
      background: var(--greige-0); border: 1px solid var(--greige-2); border-radius: var(--radius);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--dust);
    }
    .route-modes button.on { background: var(--orange); border-color: var(--orange-2); color: var(--greige-0); }

    .grille-ctrl { display: flex; align-items: center; gap: 10px; margin: 4px 0 10px; }
    .grille-swatches { display: flex; gap: 5px; }
    .grille-sw { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--greige-3); cursor: pointer; padding: 0; }
    .grille-sw.on { box-shadow: 0 0 0 2px var(--ink); }
    .grille-ctrl input[type="range"] { flex: 1; }

    .sun-block { border-top: 1px solid var(--greige-2); margin-top: 6px; padding-top: 10px; }
    .sun-modes { display: flex; gap: 4px; margin-bottom: 12px; }
    .sun-modes button {
      flex: 1; padding: 6px 4px; cursor: pointer;
      background: var(--greige-0); border: 1px solid var(--greige-2); border-radius: var(--radius);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--dust);
    }
    .sun-modes button.on { background: var(--orange); border-color: var(--orange-2); color: var(--greige-0); }
    .joystick {
      position: relative; width: 120px; height: 120px; margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ffffff, var(--greige-1) 68%, var(--greige-2));
      border: 1px solid var(--greige-3);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.1);
      touch-action: none;
    }
    .joystick::after {
      content: 'N'; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-mono); font-size: 9px; color: var(--dust);
    }
    .joystick-dot {
      position: absolute; width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(180deg, #ffffff 0%, var(--greige-1) 38%, var(--greige-3) 100%);
      box-shadow: 0 0 0 1px var(--greige-3), 0 1px 2px rgba(0,0,0,0.22);
      transform: translate(-50%, -50%); cursor: grab; touch-action: none;
    }
    .row-label {
      flex: 1;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--ink);
      line-height: 1.2;
    }
    .row-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dust);
      margin-top: 2px;
    }

    .row-swatch {
      width: 3px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 1px;
    }

    /* ── SLIDER ── */
    .slider-block {
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      padding: 7px 10px;
      margin-top: 12px;
      width: 70%;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .slider-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dust);
    }
    .slider-val {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink);
    }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--greige-3);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      background: var(--greige-0);
      border: 1px solid var(--greige-3);
      border-radius: 50%;
      cursor: pointer;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,

<script>
// ── Service Worker (cache offline 30j) — https/localhost seulement ───────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW', e));
  });
}

// ── IGN WMTS ────────────────────────────────────────────────────────────────
const IGN = (layer, format, tms) =>
  'https://data.geopf.fr/wmts?SERVICE=WMTS&VERSION=1.0.0&REQUEST=GetTile&LAYER=' +
  layer + '&STYLE=normal&FORMAT=' + (format || 'image/png') +
  '&TILEMATRIXSET=' + (tms || 'PM') + '&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}';

const SENTIERS_URL = 'https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png';

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  activeTab: 'fond',
  basemap: 'sat',
  reliefOpacity: 0.60,
  droneOpacity: 0.60,
  slopeOpacity: 0.55,
  slopeMin: 27,
  slopeMax: 43,
  grilleStep: 'auto',
  grilleColor: '#f2efe7',
  grilleWidth: 0.7,
  curvOpacity: 0.6,
  curvStrength: 9000,
  layers: {
    daylight: false,
    threeD: false,
    slope: false,
    contours: true,
    sentiers: false,
    rivieres: false,
    baignade: false,
    viewpoints: false,
    forets: false,
    grille: false,
    drone: false,
    nautique: false,
    canyoning: false,
    transport: false,
    curvature: false,
    monuments: false,
    villages: false,
    restaurants: false,
    cafes: false,
    glaciers: false,
    boulangeries: false
  }
};

const BASEMAP_NAMES = {
  sat: 'Sat + Relief',
  ign: 'Plan IGN',
  'lidar-only': 'LiDAR seul',
  aerienne50: 'Aérienne 50-65',
  etatmajor: 'Etat-Major',
  cassini: 'Cassini'
};

// ── Map init ────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'fonts/{fontstack}/{range}.pbf',
    sources: {},
    layers: []
  },
  center: [5.12, 44.81],
  zoom: 10.5,
  maxZoom: 18,
  minZoom: 7,
  attributionControl: false
});

map.addControl(new maplibregl.AttributionControl({
  compact: true,
  customAttribution: 'IGN · Waymarked · OSM'
}), 'bottom-left');

// ── Toast (fallback gracieux) ───────────────────────────────────────────────
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms || 3200);
}
// Erreurs de tuiles (IGN/Waymarked down, ou hors-ligne) → message discret throttlé
let tileErrAt = 0;
map.on('error', e => {
  if (!e || !e.error) return;
  const now = Date.now();
  if (now - tileErrAt > 6000) { tileErrAt = now; toast('Tuiles indisponibles (hors-ligne ?)'); }
});

// ── Basemap config ─────────────────────────────────────────────────────────
function getBasemapConfig(key) {
  const rel = state.reliefOpacity;
  const configs = {
    sat: {
      layers: [
        { id: 'base-sat', source: IGN('ORTHOIMAGERY.ORTHOPHOTOS', 'image/jpeg'), opacity: 0.9, maxzoom: 20 },
        { id: 'base-lidar-sat', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'),
          opacity: ['interpolate', ['linear'], ['zoom'], 8, Math.min(rel * 1.9, 0.85), 12, rel, 18, rel], maxzoom: 18 }
      ]
    },
    ign: {
      layers: [
        { id: 'base-ign', source: IGN('GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2'), opacity: 1, maxzoom: 18 },
        { id: 'base-lidar-ign', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: rel * 0.7, maxzoom: 18 }
      ]
    },
    'lidar-only': {
      layers: [{ id: 'base-lidar-solo', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: 1, maxzoom: 18 }]
    },
    aerienne50: {
      layers: [
        { id: 'base-aerienne', source: IGN('ORTHOIMAGERY.ORTHOPHOTOS.1950-1965', 'image/png'), opacity: 1, maxzoom: 18 },
        { id: 'base-lidar-aer', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: rel * 0.5, maxzoom: 18 }
      ]
    },
    etatmajor: {
      layers: [{ id: 'base-em', source: IGN('GEOGRAPHICALGRIDSYSTEMS.ETATMAJOR40', 'image/jpeg'), opacity: 1, maxzoom: 16 }]
    },
    cassini: {
      // Vrai identifiant = AN-IGNF_... (pas BNF-), format jpeg, TMS PM_0_14, z0-14
      layers: [{ id: 'base-cassini', source: IGN('AN-IGNF_GEOGRAPHICALGRIDSYSTEMS.CASSINI', 'image/jpeg', 'PM_0_14'), opacity: 1, maxzoom: 14 }]
    }
  };
  let cfg = configs[key];
  // En mode "Lumière du jour", on retire l'ombre LiDAR cuite : c'est la couche
  // hillshade dynamique (applyDaylight) qui fait le relief, soleil à l'heure réelle.
  if (cfg && state.layers.daylight && demSupported()) cfg = { layers: cfg.layers.filter(l => !l.id.includes('lidar')) };
  return cfg;
}

// ── Rerender complet ────────────────────────────────────────────────────────
// Jeton de génération : un fetch async lancé par un rerender périmé ne doit
// PAS rajouter ses couches sur un rendu plus récent (évite la carte blanche).
let renderGen = 0;
const boundEvents = new Set();

function rerender() {
  const gen = ++renderGen;
  map.getCanvas().style.cursor = ''; // évite le curseur "main" bloqué si mouseleave n'a pas fait feu
  try { map.setTerrain(null); } catch(e){} // détache la 3D avant de retirer les sources

  // Suppression dynamique : retire toutes les couches puis toutes les sources
  // présentes (peu importe leur id) — robuste et future-proof pour les couches
  // ajoutées à la volée (clusters, grille, drone, forêts…).
  (map.getStyle().layers || []).forEach(l => { try { map.removeLayer(l.id); } catch(e){} });
  Object.keys(map.getStyle().sources || {}).forEach(id => { try { map.removeSource(id); } catch(e){} });

  const config = getBasemapConfig(state.basemap);
  config.layers.forEach(l => {
    map.addSource(l.id, { type: 'raster', tiles: [l.source], tileSize: 256, maxzoom: l.maxzoom || 18 });
    map.addLayer({ id: l.id, type: 'raster', source: l.id, paint: { 'raster-opacity': l.opacity } });
  });

  if (state.layers.daylight) applyDaylight();
  if (state.layers.drone) applyDrone();
  if (state.layers.slope) applySlope();
  if (state.layers.curvature) applyCurvature();
  if (state.layers.transport) applyTransport(gen);
  if (state.layers.forets) applyForets(gen);
  if (state.layers.rivieres) applyRivieres(gen);
  if (state.layers.contours) applyContours();
  if (state.layers.grille) applyGrille();
  if (state.layers.villages) applyVillages(gen);
  if (state.layers.monuments) applyMonuments(gen);
  if (state.layers.baignade) applyBaignade(gen);
  if (state.layers.viewpoints) applyViewpoints(gen);
  if (state.layers.nautique) applyActivite('nautique', 'canoe|kayak|rafting|canoe_polo|water_ski', gen);
  if (state.layers.canyoning) applyActivite('canyoning', 'canyoning', gen);
  if (state.layers.restaurants) applyPOI('restaurants', 'restaurant', '#cc6a3a', gen);
  if (state.layers.cafes) applyPOI('cafes', 'cafe|bar|pub', '#8b5a3a', gen);
  if (state.layers.glaciers) applyPOI('glaciers', 'ice_cream', '#4a7ba3', gen);
  if (state.layers.boulangeries) applyPOI('boulangeries', 'bakery', '#a8834a', gen);
  if (state.layers.sentiers) applySentiers();
  if (gpxData) applyGpx();
  if (routePts().length) applyMeasure();

  // 3D : reliefe la carte via le MNT LiDAR HD (setTerrain)
  if (state.layers.threeD && ensureDemSource()) {
    map.setTerrain({ source: 'lidar-dem', exaggeration: 1.3 });
  }
}

// Garde : le rendu a-t-il changé pendant le fetch ? (async périmé)
function stale(gen) { return gen !== renderGen; }

function applyContours() {
  // Courbes de niveau NATIONALES via tuiles vectorielles PLAN.IGN
  // (source-layer 'oro_courbe', champ 'symbo'), visibles dès z11.
  // Couvre toute la France : pas de trou en glissant vers le Gard.
  // Fallback bas zoom : raster ELEVATION.CONTOUR.LINE (couvre z6-18), affiché
  // seulement à z9 (1:250k) — le vecteur oro_courbe prend le relais dès z10.
  map.addSource('contours-raster-src', {
    type: 'raster', tiles: [IGN('ELEVATION.CONTOUR.LINE')], tileSize: 256, maxzoom: 18
  });
  map.addLayer({ id: 'contours-raster', type: 'raster', source: 'contours-raster-src',
    minzoom: 9, maxzoom: 10, paint: { 'raster-opacity': 0.6 } });

  map.addSource('contours-src', {
    type: 'vector',
    tiles: ['https://data.geopf.fr/tms/1.0.0/PLAN.IGN/{z}/{x}/{y}.pbf'],
    minzoom: 10, maxzoom: 18
  });
  // Intercalaires — pointillés fins, seulement zoomé
  map.addLayer({ id: 'contours-int', type: 'line', source: 'contours-src', 'source-layer': 'oro_courbe',
    minzoom: 13,
    filter: ['in', 'symbo', 'CNV_INTERCALAIRE', 'CUVETTE_INTERCAL', 'CNV_SS_INTERCALAIRE'],
    paint: { 'line-color': '#f04a00', 'line-width': 0.5, 'line-opacity': 0.3, 'line-dasharray': [3, 3] } });
  // Courbes normales
  map.addLayer({ id: 'contours-10', type: 'line', source: 'contours-src', 'source-layer': 'oro_courbe',
    filter: ['in', 'symbo', 'CNV_NORMALE', 'CUVETTE_NORMALE'],
    paint: { 'line-color': '#f04a00',
      'line-width': ['interpolate', ['linear'], ['zoom'], 11, 0.4, 14, 0.8, 17, 1.4],
      'line-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.4, 14, 0.55] } });
  // Courbes maîtresses
  map.addLayer({ id: 'contours-50', type: 'line', source: 'contours-src', 'source-layer': 'oro_courbe',
    filter: ['in', 'symbo', 'CNV_MAITRESSE', 'CUVETTE_MAITRESSE'],
    paint: { 'line-color': '#f04a00',
      'line-width': ['interpolate', ['linear'], ['zoom'], 11, 0.9, 14, 1.6, 17, 2.6],
      'line-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.6, 14, 0.75] } });
}

function applySentiers() {
  map.addSource('sentiers-src', { type: 'raster', tiles: [SENTIERS_URL], tileSize: 256 });
  map.addLayer({ id: 'sentiers', type: 'raster', source: 'sentiers-src', minzoom: 9,
    paint: { 'raster-opacity': ['interpolate', ['linear'], ['zoom'], 9, 0, 11, 0.4, 13, 0.7, 15, 0.8] } });
}

// ── HILLSHADE DYNAMIQUE + 3D (MNT LiDAR HD, décodage GeoTIFF client-side) ────
// D'après les notes CTO : on télécharge le MNT LiDAR HD brut en GeoTIFF float32
// (WMS mercator), on le ré-encode en terrain-RGB → MapLibre calcule l'ombrage au
// GPU. Débloque : soleil dynamique + vraie 3D (setTerrain). Bien plus propre que
// l'ancienne version BIL 256 (coutures + falaises de nodata = les glitches).
const DEM_URL = 'float32dem://data.geopf.fr/wms-r/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap' +
  '&LAYERS=IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.LAMB93&STYLES=&CRS=EPSG:3857' +
  '&FORMAT=image/geotiff&WIDTH=512&HEIGHT=512&BBOX={bbox-epsg-3857}';

function demSupported() { return typeof GeoTIFF !== 'undefined'; }

// Protocol : GeoTIFF float32 → terrain-RGB (encodage Mapbox)
async function float32demTile(params, abortController) {
  const finalUrl = 'https://' + params.url.replace('float32dem://', '');
  const res = await fetch(finalUrl, { signal: abortController && abortController.signal });
  const buf = await res.arrayBuffer();
  const tiff = await GeoTIFF.fromArrayBuffer(buf);
  const image = await tiff.getImage();
  const w = image.getWidth(), h = image.getHeight();
  const elev = (await image.readRasters())[0];
  const rgba = new Uint8ClampedArray(w * h * 4);
  for (let i = 0; i < elev.length; i++) {
    let e = elev[i];
    if (!isFinite(e) || e < -500 || e > 9000) e = 0; // nodata / hors couverture
    const v = Math.round((e + 10000) / 0.1);
    rgba[i * 4]     = (v >> 16) & 255;
    rgba[i * 4 + 1] = (v >> 8) & 255;
    rgba[i * 4 + 2] = v & 255;
    rgba[i * 4 + 3] = 255;
  }
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').putImageData(new ImageData(rgba, w, h), 0, 0);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  return { data: await blob.arrayBuffer() };
}

if (typeof maplibregl !== 'undefined') {
  try { maplibregl.addProtocol('float32dem', float32demTile); } catch (e) {}
}

// Source DEM partagée par le hillshade dynamique ET la 3D (setTerrain)
function ensureDemSource() {
  if (!demSupported()) return false;
  if (!map.getSource('lidar-dem')) {
    map.addSource('lidar-dem', { type: 'raster-dem', tiles: [DEM_URL], tileSize: 512, encoding: 'mapbox', maxzoom: 15 });
  }
  return true;
}

function applyDaylight() {
  if (!ensureDemSource()) return; // pas de GeoTIFF (vieux navigateur) → on garde l'ombre cuite
  map.addLayer({ id: 'lidardem-hs', type: 'hillshade', source: 'lidar-dem',
    paint: {
      'hillshade-shadow-color': '#26221b',
      'hillshade-highlight-color': '#f2ece0',
      'hillshade-accent-color': '#2c2c2c',
      'hillshade-illumination-anchor': 'map',
      'hillshade-illumination-direction': sunAzimuth(),
      'hillshade-exaggeration': Math.min(state.reliefOpacity * 0.8, 1)
    } });
  updateSunlight();
}

// Contrôle du soleil : auto (heure réelle) ou manuel (joystick)
let sunManual = false, sunAzimuthManual = 200, nightMode = false;
// Position du soleil (algo SunCalc) → azimut boussole depuis le Nord
const D2R = Math.PI / 180;
function sunAzimuth() {
  const c = map.getCenter();
  return sunCompass(new Date(), c.lat, c.lng);
}
function sunCompass(date, lat, lng) {
  const lw = D2R * -lng, phi = D2R * lat;
  const d = date.valueOf() / 86400000 - 0.5 + 2440588 - 2451545;
  const M = D2R * (357.5291 + 0.98560028 * d);
  const C = D2R * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
  const L = M + C + D2R * 102.9372 + Math.PI;
  const e = D2R * 23.4397;
  const dec = Math.asin(Math.sin(e) * Math.sin(L));
  const ra = Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L));
  const th = D2R * (280.16 + 360.9856235 * d) - lw;
  const H = th - ra;
  // azimut SunCalc : 0 = Sud, +vers Ouest → boussole depuis Nord = +180°
  const az = Math.atan2(Math.sin(H), Math.cos(H) * Math.sin(phi) - Math.tan(dec) * Math.cos(phi));
  return (az / D2R + 180 + 360) % 360;
}

function updateSunlight() {
  if (!map.getLayer('lidardem-hs')) return;
  const az = sunManual ? sunAzimuthManual : sunAzimuth();
  map.setPaintProperty('lidardem-hs', 'hillshade-illumination-direction', az);
}
// Inverse : à quel moment de la journée le soleil est-il à cet azimut ?
function azimuthToHour(az) {
  const c = map.getCenter();
  let best = null, bestDiff = 999;
  for (let h = 3.5; h <= 22; h += 0.25) {
    const d = new Date(); d.setHours(Math.floor(h), Math.round((h % 1) * 60), 0, 0);
    let diff = Math.abs(sunCompass(d, c.lat, c.lng) - az);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestDiff) { bestDiff = diff; best = h; }
  }
  return bestDiff < 10 ? best : null;
}
function sunLabel(az) {
  const h = azimuthToHour(az);
  const hs = h == null ? '' : ' · ' + Math.floor(h) + 'h' + (h % 1 ? String(Math.round((h % 1) * 60)).padStart(2, '0') : '');
  return 'Azimut ' + Math.round(az) + '°' + hs;
}

const BBOX = { south: 44.55, west: 4.85, north: 45.05, east: 5.45 };
const CACHE_TTL = 1000 * 60 * 60 * 24 * 30;
const bboxStr = `${BBOX.south},${BBOX.west},${BBOX.north},${BBOX.east}`;

// Cache mémoire : garantit UN seul fetch par jeu de données pour la session,
// même si localStorage sature. Évite la tempête de refetch → rate-limit 429.
const memCache = {};
const inflight = {};

async function overpassFetch(cacheKey, query) {
  if (memCache[cacheKey]) return memCache[cacheKey];
  if (inflight[cacheKey]) return inflight[cacheKey]; // déduplique les appels concurrents

  inflight[cacheKey] = (async () => {
    try {
      // 1. Fichier statique pré-cuit (poi/*.json) : instantané, offline, fiable.
      try {
        const r = await fetch('poi/' + cacheKey + '.json');
        if (r.ok) { const data = await r.json(); if (data && data.elements) { memCache[cacheKey] = data; return data; } }
      } catch(e) {}
      // 2. Cache localStorage frais (rafraîchissements réseau précédents)
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        try { const { ts, data } = JSON.parse(cached); if (Date.now() - ts < CACHE_TTL) { memCache[cacheKey] = data; return data; } } catch(e) {}
      }
      // 3. Réseau : bascule sur plusieurs miroirs Overpass (souvent saturés).
      for (const host of OVERPASS_HOSTS) {
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 20000);
          const res = await fetch(host + '?data=' + encodeURIComponent(query), { signal: ctrl.signal });
          clearTimeout(t);
          if (!res.ok) continue;
          const data = await res.json();
          memCache[cacheKey] = data;
          try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
          return data;
        } catch (e) { /* miroir suivant */ }
      }
      throw new Error('Overpass indisponible');
    } finally {
      delete inflight[cacheKey];
    }
  })();
  return inflight[cacheKey];
}
const OVERPASS_HOSTS = [
  'https://overpass.openstreetmap.fr/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass-api.de/api/interpreter',
  'https://overpass.osm.ch/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
];

function osmToGeoJSON(osm, type) {
  const features = [];
  for (const el of osm.elements || []) {
    if (type === 'point' && el.type === 'node') {
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [el.lon, el.lat] }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    } else if (type === 'point' && (el.type === 'way' || el.type === 'relation') && el.center) {
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [el.center.lon, el.center.lat] }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    } else if (type === 'line' && el.type === 'way' && el.geometry) {
      features.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: el.geometry.map(p => [p.lon, p.lat]) }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    }
  }
  return { type: 'FeatureCollection', features };
}

// Résout (lang,title) : tag wikidata en priorité (article précis, pas la page
// d'homonymes des noms de villages), sinon tag wikipedia, sinon le nom.
async function resolveWiki(p) {
  if (p.wikidata && /^Q\d+$/.test(p.wikidata)) {
    const site = await wikidataSitelink(p.wikidata);
    if (site) return site;
  }
  if (p.wikipedia && p.wikipedia.includes(':')) {
    const i = p.wikipedia.indexOf(':');
    return { lang: p.wikipedia.slice(0, i), title: p.wikipedia.slice(i + 1) };
  }
  if (p.name) return { lang: 'fr', title: p.name };
  return null;
}

async function wikidataSitelink(qid) {
  const ck = 'wd-' + qid;
  if (memCache[ck]) return memCache[ck];
  try {
    const r = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`);
    if (!r.ok) return null;
    const d = await r.json();
    const ent = d.entities && d.entities[qid];
    const sl = ent && ent.sitelinks;
    let out = null;
    if (sl && sl.frwiki) out = { lang: 'fr', title: sl.frwiki.title };
    else if (sl && sl.enwiki) out = { lang: 'en', title: sl.enwiki.title };
    if (out) memCache[ck] = out;
    return out;
  } catch (e) { return null; }
}

  for (let lon = W; lon <= E + 1e-9; lon += step)
    feats.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: [[lon, S], [lon, N]] }, properties: {} });

// ── PENTES (slope) — calcul client-side depuis le MNT LiDAR HD ──────────────
// Protocol slope://<min>/<max>/<wms-geotiff> : décode le MNT, calcule la pente
// par pixel (gradient), colorise par degrés (transparent < min, jaune→rouge).
async function slopeTile(params) {
  const rest = params.url.replace('slope://', '');
  const i1 = rest.indexOf('/'), i2 = rest.indexOf('/', i1 + 1);
  const smin = parseFloat(rest.slice(0, i1)), smax = parseFloat(rest.slice(i1 + 1, i2));
  const wms = 'https://' + rest.slice(i2 + 1);
  const bboxM = ((wms.match(/BBOX=([^&]+)/) || [])[1] || '0,0,0,0').split(',').map(Number);
  const res = await fetch(wms);
  const buf = await res.arrayBuffer();
  const tiff = await GeoTIFF.fromArrayBuffer(buf);
  const image = await tiff.getImage();
  const w = image.getWidth(), h = image.getHeight();
  const elev = (await image.readRasters())[0];
  const latC = 2 * Math.atan(Math.exp(((bboxM[1] + bboxM[3]) / 2) / 6378137)) - Math.PI / 2;
  const dx = ((bboxM[2] - bboxM[0]) / w) * Math.cos(latC) || 10;
  const dy = ((bboxM[3] - bboxM[1]) / h) * Math.cos(latC) || 10;
  const at = (x, y) => { const e = elev[y * w + x]; return (!isFinite(e) || e < -500 || e > 9000) ? 0 : e; };
  const rgba = new Uint8ClampedArray(w * h * 4);
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const xl = x > 0 ? x - 1 : x, xr = x < w - 1 ? x + 1 : x;
    const yu = y > 0 ? y - 1 : y, yd = y < h - 1 ? y + 1 : y;
    const gx = (at(xr, y) - at(xl, y)) / ((xr - xl) * dx);
    const gy = (at(x, yd) - at(x, yu)) / ((yd - yu) * dy);
    const slope = Math.atan(Math.hypot(gx, gy)) * 180 / Math.PI;
    const o = (y * w + x) * 4;
    if (slope < smin) { rgba[o + 3] = 0; continue; }
    const t = Math.min(1, (slope - smin) / Math.max(1, smax - smin));
    let r, g, b;
    if (t < 0.5) { const u = t / 0.5; r = 255; g = Math.round(210 - 136 * u); b = Math.round(74 - 74 * u); }
    else { const u = (t - 0.5) / 0.5; r = Math.round(240 - 118 * u); g = Math.round(74 - 58 * u); b = Math.round(48 * u); }
    rgba[o] = r; rgba[o + 1] = g; rgba[o + 2] = b; rgba[o + 3] = 210;
  }
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').putImageData(new ImageData(rgba, w, h), 0, 0);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  return { data: await blob.arrayBuffer() };
}

// ── COURBURE (curvature) — laplacien du MNT : crêtes vs talwegs ──────────────
async function curvTile(params) {
  const rest = params.url.replace('curv://', '');
  const i1 = rest.indexOf('/');
  const strength = parseFloat(rest.slice(0, i1)) || 9000;
  const wms = 'https://' + rest.slice(i1 + 1);
  const bboxM = ((wms.match(/BBOX=([^&]+)/) || [])[1] || '0,0,0,0').split(',').map(Number);
  const res = await fetch(wms);
  const tiff = await GeoTIFF.fromArrayBuffer(await res.arrayBuffer());
  const image = await tiff.getImage();
  const w = image.getWidth(), h = image.getHeight();
  const elev = (await image.readRasters())[0];
  const latC = 2 * Math.atan(Math.exp(((bboxM[1] + bboxM[3]) / 2) / 6378137)) - Math.PI / 2;
  const dx = ((bboxM[2] - bboxM[0]) / w) * Math.cos(latC) || 10;
  const at = (x, y) => { const e = elev[y * w + x]; return (!isFinite(e) || e < -500 || e > 9000) ? 0 : e; };
  const rgba = new Uint8ClampedArray(w * h * 4);
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const xl = x > 0 ? x - 1 : x, xr = x < w - 1 ? x + 1 : x, yu = y > 0 ? y - 1 : y, yd = y < h - 1 ? y + 1 : y;
    const lap = (at(xl, y) + at(xr, y) + at(x, yu) + at(x, yd) - 4 * at(x, y)) / (dx * dx);
    const v = lap * strength; // échelle vers du visible (réglable)
    const o = (y * w + x) * 4, m = Math.min(1, Math.abs(v));
    if (Math.abs(v) < 0.12) { rgba[o + 3] = 0; continue; }
    if (v > 0) { rgba[o] = 60; rgba[o + 1] = 120; rgba[o + 2] = 180; } // concave = talweg (bleu)
    else { rgba[o] = 210; rgba[o + 1] = 90; rgba[o + 2] = 30; }         // convexe = crête (orange)
    rgba[o + 3] = Math.round(60 + 150 * m);
  }
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').putImageData(new ImageData(rgba, w, h), 0, 0);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  return { data: await blob.arrayBuffer() };
}

// ── ITINÉRAIRES (import de traces GPX) ──────────────────────────────────────
let gpxData = null;
function parseGpx(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  const feats = [];
  doc.querySelectorAll('trk').forEach(trk => {
    const coords = [];
    trk.querySelectorAll('trkpt').forEach(pt => {
      const lon = parseFloat(pt.getAttribute('lon')), lat = parseFloat(pt.getAttribute('lat'));
      if (isFinite(lon) && isFinite(lat)) {
        const eEl = pt.querySelector('ele');
        const ele = eEl ? parseFloat(eEl.textContent) : NaN;
        coords.push(isFinite(ele) ? [lon, lat, ele] : [lon, lat]);
      }
    });
    if (coords.length > 1) feats.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: coords }, properties: {} });
  });
  if (!feats.length) {
    const coords = [];
    doc.querySelectorAll('rtept, wpt').forEach(pt => {
      const lon = parseFloat(pt.getAttribute('lon')), lat = parseFloat(pt.getAttribute('lat'));
      if (isFinite(lon) && isFinite(lat)) {
        const eEl = pt.querySelector('ele');
        const ele = eEl ? parseFloat(eEl.textContent) : NaN;
        coords.push(isFinite(ele) ? [lon, lat, ele] : [lon, lat]);
      }
    });
    if (coords.length > 1) feats.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: coords }, properties: {} });
  }
  return feats;
}
function loadGpxText(text) {
  const feats = parseGpx(text);
  if (!feats.length) { alert('Trace GPX vide ou illisible'); return; }
  gpxData = { type: 'FeatureCollection', features: (gpxData ? gpxData.features : []).concat(feats) };
  rerender();
  const pts = feats.reduce((a, f) => a.concat(f.geometry.coordinates), []);
  const b = pts.reduce((a, c) => [Math.min(a[0], c[0]), Math.min(a[1], c[1]), Math.max(a[2], c[0]), Math.max(a[3], c[1])], [180, 90, -180, -90]);
  map.fitBounds([[b[0], b[1]], [b[2], b[3]]], { padding: 60, duration: 1000 });
  showElevProfile(pts);
}

// Profil altimétrique (mini courbe + D+/D−) depuis des coords [lon,lat,ele]
function showElevProfile(coords) {
  const box = document.getElementById('elev-box');
  const ele = coords.map(c => c[2]).filter(v => isFinite(v));
  if (ele.length < 2) { box.classList.remove('show'); return; }
  let up = 0, down = 0;
  for (let i = 1; i < ele.length; i++) { const d = ele[i] - ele[i - 1]; if (d > 0) up += d; else down -= d; }
  const mn = Math.min(...ele), mx = Math.max(...ele), span = Math.max(1, mx - mn);
  const W = 200, H = 46;
  const pdata = ele.map((v, i) => `${(i / (ele.length - 1) * W).toFixed(1)},${(H - (v - mn) / span * H).toFixed(1)}`).join(' ');
  box.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:46px;display:block">
      <polyline points="${pdata}" fill="none" stroke="#cc6a3a" stroke-width="1.5"/>
    </svg>
    <div class="elev-stats">D+ ${Math.round(up)} m · D− ${Math.round(down)} m · ${Math.round(mn)}–${Math.round(mx)} m</div>
    <div class="elev-close" id="elev-close">×</div>`;
  box.classList.add('show');
  const c = document.getElementById('elev-close');
  if (c) c.onclick = () => box.classList.remove('show');
}
function applyGpx() {

// ── PRÉCACHE HORS-LIGNE (30 j) ──────────────────────────────────────────────
// Amorce le cache : tous les jeux Overpass + les tuiles du fond/contours sur la
// bbox. Le Service Worker les garde 30 j → carte utilisable sans réseau.
function tilesForBbox(bbox, z) {
  const n = Math.pow(2, z), rad = l => l * Math.PI / 180;
  const x0 = Math.floor((bbox.west + 180) / 360 * n), x1 = Math.floor((bbox.east + 180) / 360 * n);
  const y0 = Math.floor((1 - Math.log(Math.tan(rad(bbox.north)) + 1 / Math.cos(rad(bbox.north))) / Math.PI) / 2 * n);
  const y1 = Math.floor((1 - Math.log(Math.tan(rad(bbox.south)) + 1 / Math.cos(rad(bbox.south))) / Math.PI) / 2 * n);
  const out = [];
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) out.push([z, x, y]);
  return out;
}
async function precacheTiles(onProgress) {
  const cfg = getBasemapConfig(state.basemap);
  const urls = [];
  for (const z of [10, 11, 12, 13]) {
    for (const [zz, x, y] of tilesForBbox(BBOX, z)) {
      cfg.layers.forEach(l => urls.push(l.source.replace('{z}', zz).replace('{x}', x).replace('{y}', y)));
      urls.push(`https://data.geopf.fr/tms/1.0.0/PLAN.IGN/${zz}/${x}/${y}.pbf`);
    }
  }
  let done = 0; const total = urls.length;
  const worker = async list => { for (const u of list) { try { await fetch(u); } catch (e) {} done++; if (done % 20 === 0) onProgress(done, total); } };
  const lanes = [[], [], [], [], [], []];
  urls.forEach((u, i) => lanes[i % lanes.length].push(u));
  await Promise.all(lanes.map(worker));
  onProgress(total, total);
}
async function precacheZone(btn) {
  if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
    toast('Précache actif seulement en ligne (https/localhost)'); return;
  }
  if (btn) { btn.disabled = true; btn.textContent = 'Préchargement…'; }
  toast('Préchargement des données OSM…', 5000);
  const g = -1; // gen périmé : fetch sans ajouter de couche
  const jobs = [
    applyVillages(g), applyMonuments(g), applyBaignade(g), applyViewpoints(g), applyRivieres(g), applyForets(g),
    applyPOI('restaurants', 'restaurant', '#cc6a3a', g), applyPOI('cafes', 'cafe|bar|pub', '#8b5a3a', g),
    applyPOI('glaciers', 'ice_cream', '#4a7ba3', g), applyPOI('boulangeries', 'bakery', '#a8834a', g),
    applyActivite('nautique', 'canoe|kayak|rafting|canoe_polo|water_ski', g), applyActivite('canyoning', 'canyoning', g)
  ];
  try { await Promise.all(jobs); } catch (e) {}
  await precacheTiles((d, t) => toast(`Préchargement tuiles ${d}/${t}`, 5000));
  toast('Zone préchargée pour 30 jours', 4000);
  if (btn) { btn.disabled = false; btn.textContent = 'Précharger la zone (30 j)'; }
}

// ── ITINÉRAIRE A → B (recherche de lieux + BRouter, sans clé) ────────────────
// Profils BRouter keyless : voiture (car-fast), vélo (trekking), à pied
// (hiking-mountain). Distance + temps réels + vol d'oiseau (haversine).
let routeA = null, routeB = null, routeProfile = 'car-fast', measureRoute = null;
const PROFILE_LABEL = { 'car-fast': 'Voiture', 'trekking': 'Vélo', 'hiking-mountain': 'À pied' };
function routePts() { return [routeA, routeB].filter(Boolean); }
function haversine(a, b) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (b[1] - a[1]) * r, dLon = (b[0] - a[0]) * r;
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(a[1] * r) * Math.cos(b[1] * r) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function fmtDist(m) { return m < 1000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km'; }
function fmtDur(s) { const m = Math.round(s / 60); return m < 60 ? m + ' min' : Math.floor(m / 60) + ' h ' + String(m % 60).padStart(2, '0'); }

function measureGeo() {
  const feats = routePts().map(p => ({ type: 'Feature', geometry: { type: 'Point', coordinates: p }, properties: {} }));
  if (routeA && routeB) {
    if (measureRoute) feats.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: measureRoute.coords }, properties: { kind: 'route' } });
    const vol = haversine(routeA, routeB);
    const label = measureRoute
      ? `${PROFILE_LABEL[routeProfile]} ${fmtDist(measureRoute.distance)} · ${fmtDur(measureRoute.duration)}${measureRoute.ascend ? ' · D+ ' + Math.round(measureRoute.ascend) + ' m' : ''}\nVol d'oiseau ${fmtDist(vol)}`
      : `Vol d'oiseau ${fmtDist(vol)}\n(calcul…)`;
    const mid = [(routeA[0] + routeB[0]) / 2, (routeA[1] + routeB[1]) / 2];
    feats.push({ type: 'Feature', geometry: { type: 'Point', coordinates: mid }, properties: { label } });
  }
  return { type: 'FeatureCollection', features: feats };
}
function refreshMeasure() { const s = map.getSource('measure-src'); if (s) s.setData(measureGeo()); }
function applyMeasure() {
  if (!routePts().length) return;
  map.addSource('measure-src', { type: 'geojson', data: measureGeo() });
  map.addLayer({ id: 'measure-route', type: 'line', source: 'measure-src', filter: ['==', ['get', 'kind'], 'route'],
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': '#cc6a3a', 'line-width': 4, 'line-opacity': 0.9 } });
  map.addLayer({ id: 'measure-pts', type: 'circle', source: 'measure-src', filter: ['!', ['has', 'label']],
    paint: { 'circle-radius': 5, 'circle-color': '#f2efe7', 'circle-stroke-color': '#cc6a3a', 'circle-stroke-width': 2.5 } });
  map.addLayer({ id: 'measure-lbl', type: 'symbol', source: 'measure-src', filter: ['has', 'label'],
    layout: { 'text-field': ['get', 'label'], 'text-font': ['VG5000'], 'text-size': 12, 'text-offset': [0, -1.2], 'text-anchor': 'bottom', 'text-allow-overlap': true },
    paint: { 'text-color': '#1a1a1a', 'text-halo-color': '#f2efe7', 'text-halo-width': 2 } });
}
async function fetchRoute(a, b, profile) {
  try {
    const url = `https://brouter.de/brouter?lonlats=${a[0]},${a[1]}|${b[0]},${b[1]}&profile=${profile}&alternativeidx=0&format=geojson`;
    const r = await fetch(url);
    const d = await r.json();
    const f = d.features && d.features[0];
    if (f) return { distance: +f.properties['track-length'], duration: +f.properties['total-time'], ascend: +(f.properties['filtered ascend'] || 0), coords: f.geometry.coordinates };
  } catch (e) {}
  return null;
}
function computeRoute() {
  if (!(routeA && routeB)) return;
  const a = routeA, b = routeB, pf = routeProfile;
  measureRoute = null; refreshMeasure();
  fetchRoute(a, b, pf).then(rt => {
    if (routeA === a && routeB === b && routeProfile === pf) { measureRoute = rt; refreshMeasure(); }
  });
}
function setRoutePoint(idx, lonlat) {
  if (idx === 0) routeA = lonlat; else routeB = lonlat;
  measureRoute = null;
  if (map.getSource('measure-src')) refreshMeasure(); else applyMeasure();
  if (routeA && routeB) {
    computeRoute();
    // extend() normalise l'ordre des coins (sinon bounds inversé = dézoom monde)
    const bb = new maplibregl.LngLatBounds();
    bb.extend(routeA); bb.extend(routeB);
    map.fitBounds(bb, { padding: 80, maxZoom: 13, duration: 900 });
  } else {
    map.flyTo({ center: lonlat, zoom: Math.max(map.getZoom(), 12), duration: 800 });
  }
}
function clearRoute() { routeA = routeB = measureRoute = null; refreshMeasure(); renderPanel(); }

// Recherche Nominatim pour remplir A ou B
async function routeSearch(q, resEl, idx, input) {
  if (q.trim().length < 2) { resEl.classList.remove('visible'); resEl.innerHTML = ''; return; }
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&viewbox=${BBOX.west},${BBOX.north},${BBOX.east},${BBOX.south}&bounded=0`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
    const data = await res.json();
    if (!data.length) { resEl.innerHTML = '<div class="search-result" style="color:var(--dust)">Aucun résultat</div>'; resEl.classList.add('visible'); return; }
    resEl.innerHTML = data.map(r => `<div class="search-result" data-lat="${r.lat}" data-lon="${r.lon}">${esc(r.display_name.split(',').slice(0, 2).join(','))}</div>`).join('');
    resEl.classList.add('visible');
    resEl.querySelectorAll('.search-result[data-lat]').forEach(el => el.addEventListener('click', () => {
      input.value = el.textContent;
      resEl.classList.remove('visible');
      setRoutePoint(idx, [parseFloat(el.dataset.lon), parseFloat(el.dataset.lat)]);

}

// Résumé Wikipedia (API REST) pour les popups monuments
async function fetchWikiSummary(lang, title) {
  const ck = `wiki-${lang}-${title}`;
  if (memCache[ck]) return memCache[ck];
  try {
    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if (!r.ok) return null;
    const d = await r.json();
    if (d.type && d.type.indexOf('not_found') !== -1) return null;
    memCache[ck] = d;
    return d;
  } catch(e) { return null; }
}

function iconSvg(key) {
  const p = ICON_PATHS[key];
  if (!p) return '';
  return `<svg class="row-icon" viewBox="0 0 24 24" fill="none" stroke="${ICON_COLORS[key] || '#1a1a1a'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}

// Pastilles-icônes des POI sur la carte : disque coloré + icône blanche.
// Enregistrées une fois dans la carte, réutilisées par les couches symbol.
const POI_ICON_KEYS = ['monuments', 'baignade', 'viewpoints', 'restaurants', 'cafes', 'glaciers', 'boulangeries', 'nautique', 'canyoning'];
function loadPoiIcons() {
  POI_ICON_KEYS.forEach(key => {
    if (map.hasImage('poi-' + key)) return;
    const color = ICON_COLORS[key] || '#1a1a1a';
    const svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">' +
        '<g fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(2 2) scale(1.667)">' + ICON_PATHS[key] + '</g>' +
      '</svg>';
    const img = new Image(44, 44);
    img.onload = () => { if (!map.hasImage('poi-' + key)) map.addImage('poi-' + key, img, { pixelRatio: 2 }); };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  });
}

function renderPanel() {
  content.innerHTML = PANELS[state.activeTab]();
  // Injecte l'icône après la case à cocher de chaque toggle de couche
  content.querySelectorAll('.row[data-layer]').forEach(row => {
    const svg = iconSvg(row.dataset.layer);
    if (svg) row.querySelector('.checkbox').insertAdjacentHTML('afterend', svg);
  });
  attachPanelEvents();
}

function attachPanelEvents() {
  content.querySelectorAll('[data-basemap]').forEach(row => {
    row.addEventListener('click', () => {
      state.basemap = row.dataset.basemap;
      renderPanel();
      rerender();
    });
  });

  content.querySelectorAll('[data-layer]').forEach(row => {
    row.addEventListener('click', () => {
      const l = row.dataset.layer;
      state.layers[l] = !state.layers[l];
      renderPanel();
      rerender();
      if (l === 'threeD') map.easeTo({ pitch: state.layers.threeD ? 62 : 0, duration: 700 });
    });
  });

  const slider = content.querySelector('#relief-slider');
  if (slider) {
    const val = content.querySelector('#relief-val');
    slider.addEventListener('input', () => {
      const v = parseInt(slider.value);
      val.textContent = v + '%';
      state.reliefOpacity = v / 100;
      // en mode Lumière du jour, le slider pilote l'exagération du hillshade
      if (map.getLayer('lidardem-hs')) map.setPaintProperty('lidardem-hs', 'hillshade-exaggeration', Math.min(state.reliefOpacity * 0.8, 1));
    });
    slider.addEventListener('change', rerender);
  }

  const dslider = content.querySelector('#drone-slider');
  if (dslider) {
    dslider.addEventListener('input', () => {
      state.droneOpacity = parseInt(dslider.value) / 100;
      if (map.getLayer('drone-lyr')) map.setPaintProperty('drone-lyr', 'raster-opacity', state.droneOpacity);
    });
  }

  const sop = content.querySelector('#slope-op');
  if (sop) sop.addEventListener('input', () => {
    state.slopeOpacity = parseInt(sop.value) / 100;
    if (map.getLayer('slope-lyr')) map.setPaintProperty('slope-lyr', 'raster-opacity', state.slopeOpacity);
  });
  const smin = content.querySelector('#slope-min');
  if (smin) {
    const v = content.querySelector('#slope-min-val');
    smin.addEventListener('input', () => { v.textContent = smin.value + '°'; });
    smin.addEventListener('change', () => { state.slopeMin = parseInt(smin.value); reapplySlope(); });
  }
  const smax = content.querySelector('#slope-max');
  if (smax) {
    const v = content.querySelector('#slope-max-val');
    smax.addEventListener('input', () => { v.textContent = smax.value + '°'; });
    smax.addEventListener('change', () => { state.slopeMax = parseInt(smax.value); reapplySlope(); });
  }
  const cop = content.querySelector('#curv-op');
  if (cop) cop.addEventListener('input', () => {
    state.curvOpacity = parseInt(cop.value) / 100;
    if (map.getLayer('curv-lyr')) map.setPaintProperty('curv-lyr', 'raster-opacity', state.curvOpacity);
  });
  const cstr = content.querySelector('#curv-str');
  if (cstr) cstr.addEventListener('change', () => { state.curvStrength = parseInt(cstr.value); reapplyCurvature(); });

  const gpxInput = content.querySelector('#gpx-input');
  if (gpxInput) gpxInput.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => loadGpxText(rd.result);
    rd.readAsText(f);
  });
  const gpxClear = content.querySelector('#gpx-clear');
  if (gpxClear) gpxClear.addEventListener('click', clearGpx);

  const precacheBtn = content.querySelector('#precache-btn');
  if (precacheBtn) precacheBtn.addEventListener('click', () => precacheZone(precacheBtn));

  content.querySelectorAll('[data-gcol]').forEach(b => b.addEventListener('click', () => {
    state.grilleColor = b.dataset.gcol;
    content.querySelectorAll('[data-gcol]').forEach(x => x.classList.toggle('on', x === b));
    if (map.getLayer('grille-lyr')) map.setPaintProperty('grille-lyr', 'line-color', state.grilleColor);
  }));
  const gw = content.querySelector('#grille-w');
  if (gw) gw.addEventListener('input', () => {
    state.grilleWidth = parseInt(gw.value) / 10;
    if (map.getLayer('grille-lyr')) map.setPaintProperty('grille-lyr', 'line-width', state.grilleWidth);
  });

  const nightRow = content.querySelector('#night-row');
  if (nightRow) nightRow.addEventListener('click', () => {
    nightMode = !nightMode;
    document.body.classList.toggle('night', nightMode);
    renderPanel();
  });

  const issRow = content.querySelector('#iss-row');
  if (issRow) issRow.addEventListener('click', () => { toggleISS(!issOn); renderPanel(); });

  const joy = content.querySelector('#joystick');
  if (joy) {
    const dot = content.querySelector('#joystick-dot');
    const azEl = content.querySelector('#sun-az');
    const R = 46; // rayon du rail (px)
    const place = az => {
      const rad = az * Math.PI / 180;
      dot.style.left = (60 + R * Math.sin(rad)) + 'px';
      dot.style.top = (60 - R * Math.cos(rad)) + 'px';
    };
    const setModeButtons = () => content.querySelectorAll('.sun-modes button')
      .forEach(b => b.classList.toggle('on', (b.dataset.sun === 'manual') === sunManual));
    place(sunManual ? sunAzimuthManual : sunAzimuth());
    const drag = ev => {
      const r = joy.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const p = ev.touches ? ev.touches[0] : ev;
      let az = Math.atan2(p.clientX - cx, -(p.clientY - cy)) * 180 / Math.PI;
      az = (az + 360) % 360;
      sunManual = true; sunAzimuthManual = az;
      place(az); azEl.textContent = sunLabel(az);
      setModeButtons(); updateSunlight();
    };
    const stop = () => { window.removeEventListener('pointermove', drag); window.removeEventListener('pointerup', stop); };
    joy.addEventListener('pointerdown', ev => { ev.preventDefault(); drag(ev); window.addEventListener('pointermove', drag); window.addEventListener('pointerup', stop); });
    content.querySelectorAll('.sun-modes button').forEach(b => b.addEventListener('click', () => {
      sunManual = b.dataset.sun === 'manual';
      setModeButtons(); updateSunlight();
      const az = sunManual ? sunAzimuthManual : sunAzimuth();
      place(az); azEl.textContent = sunLabel(az);
    }));
    const hourSlider = content.querySelector('#sun-hour');
    if (hourSlider) hourSlider.addEventListener('input', () => {
      const h = parseFloat(hourSlider.value);
      const d = new Date(); d.setHours(Math.floor(h), Math.round((h % 1) * 60), 0, 0);
      const c = map.getCenter();
      sunManual = true; sunAzimuthManual = sunCompass(d, c.lat, c.lng);
      place(sunAzimuthManual); setModeButtons(); updateSunlight();
      azEl.textContent = 'Azimut ' + Math.round(sunAzimuthManual) + '° · ' + Math.floor(h) + 'h' + (h % 1 ? '30' : '');
    });
  }

  const ra = content.querySelector('#route-a');
  if (ra) ra.addEventListener('input', debounce(() => routeSearch(ra.value, content.querySelector('#route-a-res'), 0, ra), 350));
  const rb = content.querySelector('#route-b');
  if (rb) rb.addEventListener('input', debounce(() => routeSearch(rb.value, content.querySelector('#route-b-res'), 1, rb), 350));
  content.querySelectorAll('.route-modes button').forEach(b => b.addEventListener('click', () => {
    routeProfile = b.dataset.prof;
    content.querySelectorAll('.route-modes button').forEach(x => x.classList.toggle('on', x === b));
    computeRoute();
  }));
  const rc = content.querySelector('#route-clear');
  if (rc) rc.addEventListener('click', clearRoute);

  const searchInput = content.querySelector('#search-input');
  if (searchInput) {
    searchInput.addEventListener('input', debounce(handleSearch, 350));
  }
}

// ── SEARCH ──────────────────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function handleSearch(e) {
  const q = e.target.value.trim();
  const results = document.getElementById('search-results');
  if (q.length < 2) {
    results.classList.remove('visible');
    results.innerHTML = '';
    return;
  }
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ' Drôme France')}&limit=6&viewbox=${BBOX.west},${BBOX.north},${BBOX.east},${BBOX.south}&bounded=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
    const data = await res.json();
    if (!data.length) {
      results.innerHTML = '<div class="search-result" style="color:var(--dust)">Aucun résultat</div>';
      results.classList.add('visible');
      return;
    }
    results.innerHTML = data.map(r =>
      `<div class="search-result" data-lat="${r.lat}" data-lon="${r.lon}">${r.display_name.split(',').slice(0, 2).join(',')}</div>`
    ).join('');
    results.classList.add('visible');
    results.querySelectorAll('.search-result[data-lat]').forEach(el => {
      el.addEventListener('click', () => {
        map.flyTo({ center: [parseFloat(el.dataset.lon), parseFloat(el.dataset.lat)], zoom: 13, duration: 1200 });
        results.classList.remove('visible');
        e.target.value = '';
      });
    });
  } catch(err) {
    console.warn('Search failed', err);
  }
}

// ── TABS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    renderPanel();

    // Auto-open panel if collapsed
    if (panelWrap.classList.contains('collapsed')) {
      panelWrap.classList.remove('collapsed');
      document.body.classList.remove('panel-collapsed');
      collapsed = false;
    }
  });
});

// ── HANDLE (open/close panel) ───────────────────────────────────────────────
const panelWrap = document.getElementById('panel-wrap');
let collapsed = false;
document.getElementById('handle').addEventListener('click', () => {
  collapsed = !collapsed;
  panelWrap.classList.toggle('collapsed', collapsed);
  document.body.classList.toggle('panel-collapsed', collapsed);
});

// ── Géolocalisation ─────────────────────────────────────────────────────────
let geolocActive = false, geolocMarker = null, watchId = null;
const geoBtn = document.getElementById('geolocate');

function createGeolocEl() {
  const el = document.createElement('div');
  el.innerHTML = '<svg class="geoloc-marker" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg"><circle cx="15" cy="15" r="13" fill="#cc6a3a" fill-opacity="0.14"/><circle cx="15" cy="15" r="8" fill="#cc6a3a" fill-opacity="0.28"/><circle cx="15" cy="15" r="4.5" fill="#1a1a1a"/><circle cx="15" cy="15" r="4.5" fill="none" stroke="#cc6a3a" stroke-width="1.4"/></svg>';
  return el;
}

geoBtn.addEventListener('click', () => {
  if (!geolocActive) {
    if (!navigator.geolocation) { alert('Géolocalisation non disponible'); return; }
    geolocActive = true;
    geoBtn.classList.add('active');
    watchId = navigator.geolocation.watchPosition(pos => {
      const { longitude, latitude } = pos.coords;
      if (!geolocMarker) {
        geolocMarker = new maplibregl.Marker({ element: createGeolocEl(), anchor: 'center' }).setLngLat([longitude, latitude]).addTo(map);
        map.flyTo({ center: [longitude, latitude], zoom: 13, duration: 1200 });
      } else {
        geolocMarker.setLngLat([longitude, latitude]);
      }
    }, err => { console.warn('Géoloc error', err); geolocActive = false; geoBtn.classList.remove('active'); }, { enableHighAccuracy: true });
  } else {
    geolocActive = false;
    geoBtn.classList.remove('active');
    if (watchId) navigator.geolocation.clearWatch(watchId);
    if (geolocMarker) { geolocMarker.remove(); geolocMarker = null; }
  }
});

// ── MAISON ──────────────────────────────────────────────────────────────────

const homeEl = document.createElement('div');
homeEl.style.cssText = 'width:30px;height:30px;cursor:pointer';
homeEl.innerHTML =
  '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#3d3bd6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M5 12l-2 0l9 -9l9 9l-2 0"/>' +
    '<path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/>' +
    '<path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/>' +
  '</svg>';
homeEl.addEventListener('click', () => map.flyTo({ center: HOME, zoom: 15, duration: 1200 }));
new maplibregl.Marker({ element: homeEl, anchor: 'center' }).setLngLat(HOME).addTo(map);

document.getElementById('home-btn').addEventListener('click',
  () => map.flyTo({ center: HOME, zoom: 15, duration: 1200 }));

// Boussole : la rose tourne avec le cap, clic → retour au nord
const compassRose = document.getElementById('compass-rose');
map.on('rotate', () => { compassRose.style.transform = `rotate(${-map.getBearing()}deg)`; });
document.getElementById('compass').addEventListener('click', () => map.easeTo({ bearing: 0, duration: 500 }));

// ── EASTER EGG : position live de l'ISS ─────────────────────────────────────
let issOn = false, issMarker = null, issTimer = null;
function issEl() {
  const el = document.createElement('div');
  el.style.cssText = 'width:38px;height:38px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));cursor:pointer';
  el.innerHTML =
    '<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
      '<circle cx="12" cy="12" r="11" fill="#f2efe7" stroke="none"/>' +
      '<rect x="10" y="10" width="4" height="4" fill="#cc6a3a" stroke="#8b3a1a"/>' +
      '<path d="M10 12h-5M14 12h5"/>' +
      '<rect x="2" y="9.5" width="3" height="5" fill="#4a7ba3"/>' +
      '<rect x="19" y="9.5" width="3" height="5" fill="#4a7ba3"/>' +
    '</svg>';
  el.title = 'Station Spatiale Internationale';
  el.addEventListener('click', () => { if (issMarker) map.flyTo({ center: issMarker.getLngLat(), zoom: 4, duration: 1500 }); });
  return el;
}
async function updateISS() {
  try {
    const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    const d = await r.json();
    if (!issMarker) issMarker = new maplibregl.Marker({ element: issEl(), anchor: 'center' }).setLngLat([d.longitude, d.latitude]).addTo(map);
    else issMarker.setLngLat([d.longitude, d.latitude]);
  } catch(e) {}
}
function toggleISS(on) {
  issOn = on;
  if (on) { updateISS(); issTimer = setInterval(updateISS, 4000); toast('ISS suivie en direct'); }
  else { if (issTimer) clearInterval(issTimer); issTimer = null; if (issMarker) { issMarker.remove(); issMarker = null; } }
}

const scaleVal = document.getElementById('scale-val');
function updateScale() {
  const zoom = map.getZoom();
  const scales = { 7: '1:1M', 8: '1:500k', 9: '1:250k', 10: '1:150k', 11: '1:75k', 12: '1:40k', 13: '1:20k', 14: '1:10k', 15: '1:5k' };
  const rounded = Math.round(zoom);
  scaleVal.textContent = scales[rounded] || 'Z' + zoom.toFixed(1);
}
map.on('zoom', updateScale);
// Grille en densité auto : re-densifie quand le zoom change
let grilleZ = -1;
map.on('moveend', () => {
  if (!state.layers.grille || state.grilleStep !== 'auto') return;
  const z = Math.round(map.getZoom());
  if (z !== grilleZ) { grilleZ = z; reapplyGrille(); }
});
function hideSplash() {
  const s = document.getElementById('splash');
  if (!s || s.classList.contains('hide')) return;
  s.classList.add('hide');
  setTimeout(() => { s.style.display = 'none'; }, 650);
}
map.on('load', () => { loadPoiIcons(); updateScale(); rerender(); setTimeout(hideSplash, 500); });
setTimeout(hideSplash, 3500); // filet de sécurité

// Init
renderPanel();
</script>
