<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drôme · Diois</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    @font-face {
      font-family: 'VG5000';
      src: url('https://cdn.velvetyne.fr/fonts/vg5000/VG5000-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'VG5000';
      src: url('https://cdn.velvetyne.fr/fonts/vg5000/VG5000-Mezzo.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }
  </style>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --ink:          #1a1a1a;
      --ink-2:        #2c2c2c;

      /* Greige palette */
      --greige-0:     #f2efe7;
      --greige-1:     #e4e0d5;
      --greige-2:     #d0ccc0;
      --greige-3:     #b8b4a7;
      --greige-4:     #8a877c;

      /* Accents */
      --orange:       #cc6a3a;
      --orange-2:     #b8582a;
      --orange-glow:  rgba(204, 106, 58, 0.5);

      /* Layer accent hues */
      --hue-water:    #4a7ba3;
      --hue-relief:   #6b6355;
      --hue-heritage: #8b5a3a;
      --hue-food:     #cc6a3a;

      --dust:         rgba(26, 26, 26, 0.55);
      --dust-2:       rgba(26, 26, 26, 0.35);

      --radius:       3px;
      --radius-l:     6px;

      --font-ui:      'VG5000', system-ui, sans-serif;
      --font-mono:    'VG5000', 'JetBrains Mono', monospace;

      --panel-h:      42vh;
      --tab-w:        44px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--greige-1);
      font-family: var(--font-ui);
      color: var(--ink);
    }

    #map { position: absolute; inset: 0; background: #1a1e21; }
    .maplibregl-canvas {
      filter: brightness(1.06) contrast(0.94) saturate(0.88);
    }

    /* ── ÉCHELLE (petit rectangle noir bas droite, comme dans ton croquis) ── */
    #scale {
      position: absolute;
      bottom: calc(var(--panel-h) + 12px);
      right: 12px;
      background: var(--ink);
      color: var(--greige-0);
      padding: 5px 9px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      z-index: 10;
      pointer-events: none;
      border-radius: var(--radius);
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #scale .num {
      color: var(--orange);
    }

    /* ── BOUTONS CARTE (zoom + géoloc) ── */
    #map-controls {
      position: absolute;
      bottom: calc(var(--panel-h) + 12px);
      right: 12px;
      display: none;
      z-index: 10;
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* Zoom en haut du panel dans une bande - see below */

    #geolocate {
      position: absolute;
      bottom: calc(var(--panel-h) + 52px);
      right: 12px;
      width: 42px; height: 42px;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius-l);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 -1px 0 rgba(0,0,0,0.05) inset,
        0 4px 10px rgba(0,0,0,0.10);
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1), background 0.15s;
    }
    #geolocate.active {
      background: var(--ink);
      border-color: var(--ink);
    }
    #geolocate.active svg { stroke: var(--orange); }
    #geolocate:active { transform: scale(0.94); }

    #zoom-btns {
      position: absolute;
      bottom: calc(var(--panel-h) + 104px);
      right: 12px;
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* Mêmes principes 3D que les toggles hardware */
    .zoom-btn {
      width: 42px; height: 36px;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 -1px 0 rgba(0,0,0,0.05) inset,
        0 4px 10px rgba(0,0,0,0.10);
    }
    .zoom-btn:first-child {
      border-radius: var(--radius-l) var(--radius-l) 0 0;
      border-bottom: none;
    }
    .zoom-btn:last-child { border-radius: 0 0 var(--radius-l) var(--radius-l); }
    .zoom-btn:active { background: var(--greige-1); transform: scale(0.96); }

    /* ── PANEL BOTTOM = LE BLOC ── */
    #panel-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: var(--panel-h);
      z-index: 20;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #panel-wrap.collapsed {
      transform: translateY(calc(var(--panel-h) - 40px));
    }

    /* Handle en haut du bloc */
    .panel-handle {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 20px;
      background: var(--greige-1);
      border: 1px solid var(--greige-2);
      border-bottom: none;
      border-radius: var(--radius-l) var(--radius-l) 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .panel-handle::before {
      content: '';
      width: 28px; height: 3px;
      background: var(--greige-4);
      border-radius: 2px;
      opacity: 0.6;
    }

    /* Le bloc lui-même */
    #panel {
      position: absolute;
      inset: 0;
      background: var(--greige-1);
      border-top: 1px solid var(--greige-2);
      box-shadow:
        0 -2px 20px rgba(0,0,0,0.08),
        0 1px 0 rgba(255,255,255,0.7) inset;
      display: flex;
      flex-direction: row;
    }

    /* Contenu principal du panel (gauche) */
    .panel-content {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px 16px 20px;
      background: var(--greige-1);
    }
    .panel-content::-webkit-scrollbar { width: 0; display: none; }
    .panel-content { scrollbar-width: none; }

    /* ── INTERCALAIRES DROITE ── */
    /* Colonne d'intercalaires = bord droit de la MÊME fiche (greige-1),
       pas des onglets rapportés à côté */
    .tabs-column {
      width: var(--tab-w);
      display: flex;
      flex-direction: column;
      background: var(--greige-1);
      padding-top: 12px;
      position: relative;
    }

    .tab {
      position: relative;
      flex: 1;
      max-height: 92px;
      background: var(--greige-1);
      border-left: 1px solid var(--greige-2);
      border-bottom: 1px solid var(--greige-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 8px 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dust);
      transition: all 0.2s;
    }
    .tab:last-child { border-bottom: none; }

    /* Intercalaire actif = languette de la fiche tirée vers l'avant */
    .tab.active {
      background: var(--orange);
      border-left-color: var(--orange-2);
      color: var(--greige-0);
      z-index: 2;
    }
    .tab.active::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 0; bottom: 0;
      width: 8px;
      background: var(--orange);
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .tab:not(.active):hover { background: var(--greige-2); }
    .tab:active { filter: brightness(0.95); }

    /* ── SEARCH BAR (dans le module fond ou global) ── */
    /* Barre de recherche compacte, coins prononcés */
    .search-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 58%;
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: 9px;
      padding: 4px 9px;
      margin-bottom: 12px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 1px 3px rgba(0,0,0,0.06);
    }
    .search-row input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--ink);
    }
    .search-row input::placeholder { color: var(--dust-2); }
    .search-row .search-icon {
      width: 12px; height: 12px;
      border: 1.5px solid var(--dust);
      border-radius: 50%;
      position: relative;
    }
    .search-row .search-icon::after {
      content: '';
      position: absolute;
      right: -4px; bottom: -4px;
      width: 6px; height: 1.5px;
      background: var(--dust);
      transform: rotate(45deg);
    }

    .search-results {
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: none;
    }
    .search-results.visible { display: block; }
    .search-result {
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--greige-1);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: var(--greige-1); }

    /* ── CHECKBOX ROWS (à la Braun) ── */
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 4px;
      cursor: pointer;
      border-bottom: 1px solid var(--greige-2);
      transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    /* Options de fond de carte : pas de lignes de séparation */
    .row[data-basemap] { border-bottom: none; padding: 6px 4px; }
    .row:active { background: var(--greige-2); }

    /* Toggle hardware : carré greige, cercle dedans, ombre portée 3D */
    .checkbox {
      width: 22px; height: 22px;
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      background: var(--greige-0);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.7) inset,
        0 -1px 0 rgba(0,0,0,0.06) inset,
        0 2px 4px rgba(0,0,0,0.12);
      transition: all 0.15s;
    }
    .checkbox::after {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--greige-3);
      box-shadow: 0 1px 1px rgba(0,0,0,0.25) inset;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .row.active .checkbox { border-color: var(--greige-3); }
    .row.active .checkbox::after {
      background: var(--orange);
      box-shadow: 0 0 4px var(--orange-glow);
    }
    .row:active .checkbox { transform: scale(0.95); }

    .row-label {
      flex: 1;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--ink);
      line-height: 1.2;
    }
    .row-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dust);
      margin-top: 2px;
    }

    .row-swatch {
      width: 3px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 1px;
    }

    /* ── SLIDER ── */
    .slider-block {
      background: var(--greige-0);
      border: 1px solid var(--greige-2);
      border-radius: var(--radius);
      padding: 7px 10px;
      margin-top: 12px;
      width: 70%;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .slider-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dust);
    }
    .slider-val {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink);
    }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--greige-3);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      background: var(--greige-0);
      border: 1px solid var(--greige-3);
      border-radius: 50%;
      cursor: pointer;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,
        0 -1px 0 rgba(0,0,0,0.1) inset,
        0 2px 4px rgba(0,0,0,0.15);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      background: var(--greige-0);
      border: 1px solid var(--greige-3);
      border-radius: 50%;
      cursor: pointer;
    }

    /* Attribution */
    .maplibregl-ctrl-attrib {
      background: var(--greige-0) !important;
      border: 1px solid var(--greige-2);
      border-radius: var(--radius) !important;
      font-family: var(--font-mono) !important;
      font-size: 9px !important;
      letter-spacing: 0.06em;
      color: var(--dust) !important;
      padding: 3px 6px !important;
      margin: 4px !important;
    }
    .maplibregl-ctrl-attrib a { color: var(--ink) !important; }

    /* Popup */
    .maplibregl-popup-content {
      background: var(--greige-0) !important;
      border: 1px solid var(--greige-2);
      border-radius: var(--radius-l) !important;
      font-family: var(--font-ui) !important;
      color: var(--ink) !important;
      padding: 12px 14px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
      max-width: 240px !important;
    }
    .maplibregl-popup-content .p-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .maplibregl-popup-content .p-kind {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dust);
    }
    .maplibregl-popup-content .p-wiki {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 9px;
      background: var(--ink);
      color: var(--greige-0);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      border-radius: var(--radius);
      text-decoration: none;
    }
    .maplibregl-popup-content .p-wiki:hover {
      background: var(--orange);
    }

    .geoloc-marker { width: 30px; height: 30px; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="scale">
  Ech. <span class="num" id="scale-val">1:100k</span>
</div>

<div id="zoom-btns">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">−</button>
</div>

<button id="geolocate" title="Ma position">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <circle cx="12" cy="12" r="8" stroke-dasharray="2 2.5"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
  </svg>
</button>

<div id="panel-wrap">
  <div class="panel-handle" id="handle"></div>
  <div id="panel">
    <div class="panel-content" id="panel-content">
      <!-- Contenu dynamique injecté ici -->
    </div>
    <div class="tabs-column">
      <div class="tab active" data-tab="fond">Fond</div>
      <div class="tab" data-tab="nature">Nature</div>
      <div class="tab" data-tab="patri">Patri.</div>
      <div class="tab" data-tab="commerce">Comm.</div>
    </div>
  </div>
</div>

<script>
// ── IGN WMTS ────────────────────────────────────────────────────────────────
const IGN = (layer, format, tms) =>
  'https://data.geopf.fr/wmts?SERVICE=WMTS&VERSION=1.0.0&REQUEST=GetTile&LAYER=' +
  layer + '&STYLE=normal&FORMAT=' + (format || 'image/png') +
  '&TILEMATRIXSET=' + (tms || 'PM') + '&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}';

const SENTIERS_URL = 'https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png';

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  activeTab: 'fond',
  basemap: 'sat',
  reliefOpacity: 0.35,
  layers: {
    contours: true,
    sentiers: true,
    rivieres: false,
    baignade: false,
    monuments: false,
    villages: false,
    restaurants: false,
    cafes: false,
    glaciers: false,
    boulangeries: false
  }
};

const BASEMAP_NAMES = {
  sat: 'Sat + Relief',
  ign: 'Plan IGN',
  'lidar-only': 'LiDAR seul',
  aerienne50: 'Aérienne 50-65',
  etatmajor: 'Etat-Major'
};

// ── Map init ────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: { version: 8, sources: {}, layers: [] },
  center: [5.12, 44.81],
  zoom: 10.5,
  maxZoom: 18,
  minZoom: 7,
  attributionControl: false
});

map.addControl(new maplibregl.AttributionControl({
  compact: true,
  customAttribution: 'IGN · Waymarked · OSM'
}), 'bottom-left');

// ── Basemap config ─────────────────────────────────────────────────────────
function getBasemapConfig(key) {
  const rel = state.reliefOpacity;
  const configs = {
    sat: {
      layers: [
        { id: 'base-sat', source: IGN('ORTHOIMAGERY.ORTHOPHOTOS', 'image/jpeg'), opacity: 0.9, maxzoom: 20 },
        { id: 'base-lidar-sat', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: rel, maxzoom: 18 }
      ]
    },
    ign: {
      layers: [
        { id: 'base-ign', source: IGN('GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2'), opacity: 1, maxzoom: 18 },
        { id: 'base-lidar-ign', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: rel * 0.7, maxzoom: 18 }
      ]
    },
    'lidar-only': {
      layers: [{ id: 'base-lidar-solo', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: 1, maxzoom: 18 }]
    },
    aerienne50: {
      layers: [
        { id: 'base-aerienne', source: IGN('ORTHOIMAGERY.ORTHOPHOTOS.1950-1965', 'image/png'), opacity: 1, maxzoom: 18 },
        { id: 'base-lidar-aer', source: IGN('IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.SHADOW'), opacity: rel * 0.5, maxzoom: 18 }
      ]
    },
    etatmajor: {
      layers: [{ id: 'base-em', source: IGN('GEOGRAPHICALGRIDSYSTEMS.ETATMAJOR40', 'image/jpeg'), opacity: 1, maxzoom: 16 }]
    }
  };
  return configs[key];
}

// ── Rerender complet ────────────────────────────────────────────────────────
function rerender() {
  const allIds = [
    'base-sat', 'base-lidar-sat', 'base-ign', 'base-lidar-ign', 'base-lidar-solo',
    'base-aerienne', 'base-lidar-aer', 'base-em',
    'contours-10', 'contours-50', 'sentiers',
    'villages-pts', 'villages-lbl', 'monuments-pts', 'baignade-pts', 'rivieres-lines',
    'restaurants-pts', 'cafes-pts', 'glaciers-pts', 'boulangeries-pts'
  ];
  allIds.forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });

  const allSrcs = [
    'contours-src', 'sentiers-src',
    'base-sat', 'base-lidar-sat', 'base-ign', 'base-lidar-ign', 'base-lidar-solo',
    'base-aerienne', 'base-lidar-aer', 'base-em',
    'villages-src', 'monuments-src', 'baignade-src', 'rivieres-src',
    'restaurants-src', 'cafes-src', 'glaciers-src', 'boulangeries-src'
  ];
  allSrcs.forEach(id => { if (map.getSource(id)) map.removeSource(id); });

  const config = getBasemapConfig(state.basemap);
  config.layers.forEach(l => {
    map.addSource(l.id, { type: 'raster', tiles: [l.source], tileSize: 256, maxzoom: l.maxzoom || 18 });
    map.addLayer({ id: l.id, type: 'raster', source: l.id, paint: { 'raster-opacity': l.opacity } });
  });

  if (state.layers.rivieres) applyRivieres();
  if (state.layers.contours) applyContours();
  if (state.layers.villages) applyVillages();
  if (state.layers.monuments) applyMonuments();
  if (state.layers.baignade) applyBaignade();
  if (state.layers.restaurants) applyPOI('restaurants', 'restaurant', '#cc6a3a');
  if (state.layers.cafes) applyPOI('cafes', 'cafe|bar|pub', '#8b5a3a');

// ── Overpass ─────────────────────────────────────────────────────────────
const BBOX = { south: 44.55, west: 4.85, north: 45.05, east: 5.45 };
const CACHE_TTL = 1000 * 60 * 60 * 24 * 30;
const bboxStr = `${BBOX.south},${BBOX.west},${BBOX.north},${BBOX.east}`;

async function overpassFetch(cacheKey, query) {
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL) return data;
    } catch(e) {}
  }
  const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);
  const res = await fetch(url);
  if (!res.ok) throw new Error('Overpass ' + res.status);
  const data = await res.json();
  try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
  return data;
}

function osmToGeoJSON(osm, type) {
  const features = [];
  for (const el of osm.elements || []) {
    if (type === 'point' && el.type === 'node') {
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [el.lon, el.lat] }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    } else if (type === 'point' && el.type === 'way' && el.center) {
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [el.center.lon, el.center.lat] }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    } else if (type === 'line' && el.type === 'way' && el.geometry) {
      features.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: el.geometry.map(p => [p.lon, p.lat]) }, properties: { name: (el.tags && el.tags.name) || '', ...el.tags } });
    }
  }
  return { type: 'FeatureCollection', features };
}

async function applyVillages() {
  const q = `[out:json][timeout:25];(node["place"~"^(village|town|hamlet)$"](${bboxStr}););out;`;
  try {
    const osm = await overpassFetch('drm-villages-v3', q);
    const gj = osmToGeoJSON(osm, 'point');
    if (map.getSource('villages-src')) return;
    map.addSource('villages-src', { type: 'geojson', data: gj });
    map.addLayer({ id: 'villages-pts', type: 'circle', source: 'villages-src',
      paint: { 'circle-radius': ['interpolate', ['linear'], ['zoom'], 9, 2, 14, 5],
        'circle-color': '#1a1a1a', 'circle-stroke-color': '#f2efe7', 'circle-stroke-width': 1 } });
    map.addLayer({ id: 'villages-lbl', type: 'symbol', source: 'villages-src',
      layout: { 'text-field': ['get', 'name'],
        'text-size': ['interpolate', ['linear'], ['zoom'], 10, 10, 14, 13],
        'text-offset': [0, 1.1], 'text-anchor': 'top', 'text-allow-overlap': false },
      paint: { 'text-color': '#1a1a1a', 'text-halo-color': 'rgba(242,239,231,0.85)', 'text-halo-width': 1.5 } });
  } catch(e) { console.warn('Villages fetch failed', e); }
}

async function applyMonuments() {
  const q = `[out:json][timeout:25];(node["historic"](${bboxStr});way["historic"](${bboxStr}););out center;`;
  try {
    const osm = await overpassFetch('drm-monuments-v3', q);
    const gj = osmToGeoJSON(osm, 'point');
    if (map.getSource('monuments-src')) return;
    map.addSource('monuments-src', { type: 'geojson', data: gj });
    map.addLayer({ id: 'monuments-pts', type: 'circle', source: 'monuments-src',
      paint: { 'circle-radius': ['interpolate', ['linear'], ['zoom'], 9, 3, 14, 7],
        'circle-color': '#8b5a3a', 'circle-stroke-color': '#f2efe7', 'circle-stroke-width': 1.5 } });
    map.on('click', 'monuments-pts', onMonumentClick);
    map.on('mouseenter', 'monuments-pts', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'monuments-pts', () => map.getCanvas().style.cursor = '');
  } catch(e) { console.warn('Monuments fetch failed', e); }
}

function onMonumentClick(e) {
  const p = e.features[0].properties;
  const name = p.name || (p.historic ? p.historic.replace(/_/g, ' ') : 'Monument');
  const kind = (p.historic || '').replace(/_/g, ' ');
  const wiki = p.wikipedia;
  let wikiHtml = '';
  if (wiki && wiki.includes(':')) {
    const [lang, article] = wiki.split(':');
    const url = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(article)}`;
    wikiHtml = `<br><a class="p-wiki" href="${url}" target="_blank" rel="noopener">Wikipedia →</a>`;
  } else if (p.name) {
    const url = `https://fr.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(p.name)}`;
    wikiHtml = `<br><a class="p-wiki" href="${url}" target="_blank" rel="noopener">Chercher →</a>`;
  }
  new maplibregl.Popup({ closeButton: true, offset: 12 })
    .setLngLat(e.lngLat)
    .setHTML(`<div class="p-title">${name}</div><div class="p-kind">${kind}</div>${wikiHtml}`)
    .addTo(map);
}

async function applyBaignade() {
  const q = `[out:json][timeout:25];(node["leisure"~"^(swimming_area|swimming_pool)$"](${bboxStr});node["natural"="beach"](${bboxStr}););out;`;

async function applyPOI(key, amenityRegex, color) {
  const q = `[out:json][timeout:25];(node["amenity"~"^(${amenityRegex})$"](${bboxStr});node["shop"~"^(${amenityRegex})$"](${bboxStr}););out;`;

function renderPanel() {
  content.innerHTML = PANELS[state.activeTab]();
  attachPanelEvents();
}

function attachPanelEvents() {
  content.querySelectorAll('[data-basemap]').forEach(row => {
    row.addEventListener('click', () => {
      state.basemap = row.dataset.basemap;
      renderPanel();
      rerender();
    });
  });

  content.querySelectorAll('[data-layer]').forEach(row => {
    row.addEventListener('click', () => {
      const l = row.dataset.layer;
      state.layers[l] = !state.layers[l];
      renderPanel();
      rerender();
    });
  });

  const slider = content.querySelector('#relief-slider');
  if (slider) {
    const val = content.querySelector('#relief-val');
    slider.addEventListener('input', () => {
      const v = parseInt(slider.value);
      val.textContent = v + '%';
      state.reliefOpacity = v / 100;
    });
    slider.addEventListener('change', rerender);
  }

  const searchInput = content.querySelector('#search-input');
  if (searchInput) {
    searchInput.addEventListener('input', debounce(handleSearch, 350));
  }
}

// ── SEARCH ──────────────────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function handleSearch(e) {
  const q = e.target.value.trim();
  const results = document.getElementById('search-results');
  if (q.length < 2) {
    results.classList.remove('visible');
    results.innerHTML = '';
    return;
  }
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ' Drôme France')}&limit=6&viewbox=${BBOX.west},${BBOX.north},${BBOX.east},${BBOX.south}&bounded=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
    const data = await res.json();
    if (!data.length) {
      results.innerHTML = '<div class="search-result" style="color:var(--dust)">Aucun résultat</div>';
      results.classList.add('visible');
      return;
    }
    results.innerHTML = data.map(r =>
      `<div class="search-result" data-lat="${r.lat}" data-lon="${r.lon}">${r.display_name.split(',').slice(0, 2).join(',')}</div>`
    ).join('');
    results.classList.add('visible');
    results.querySelectorAll('.search-result[data-lat]').forEach(el => {
      el.addEventListener('click', () => {
        map.flyTo({ center: [parseFloat(el.dataset.lon), parseFloat(el.dataset.lat)], zoom: 13, duration: 1200 });
        results.classList.remove('visible');
        e.target.value = '';
      });
    });
  } catch(err) {
    console.warn('Search failed', err);
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    renderPanel();

    // Auto-open panel if collapsed
    if (panelWrap.classList.contains('collapsed')) {
      panelWrap.classList.remove('collapsed');
      collapsed = false;
    }
  });
});

// ── HANDLE (open/close panel) ───────────────────────────────────────────────
const panelWrap = document.getElementById('panel-wrap');
let collapsed = false;
document.getElementById('handle').addEventListener('click', () => {
  collapsed = !collapsed;
  panelWrap.classList.toggle('collapsed', collapsed);
});

// ── Géolocalisation ─────────────────────────────────────────────────────────
let geolocActive = false, geolocMarker = null, watchId = null;
const geoBtn = document.getElementById('geolocate');

function createGeolocEl() {
  const el = document.createElement('div');
  el.innerHTML = '<svg class="geoloc-marker" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg"><circle cx="15" cy="15" r="13" fill="#cc6a3a" fill-opacity="0.14"/><circle cx="15" cy="15" r="8" fill="#cc6a3a" fill-opacity="0.28"/><circle cx="15" cy="15" r="4.5" fill="#1a1a1a"/><circle cx="15" cy="15" r="4.5" fill="none" stroke="#cc6a3a" stroke-width="1.4"/></svg>';
  return el;
}

geoBtn.addEventListener('click', () => {
  if (!geolocActive) {
    if (!navigator.geolocation) { alert('Géolocalisation non disponible'); return; }
    geolocActive = true;
    geoBtn.classList.add('active');
    watchId = navigator.geolocation.watchPosition(pos => {
      const { longitude, latitude } = pos.coords;
      if (!geolocMarker) {
        geolocMarker = new maplibregl.Marker({ element: createGeolocEl(), anchor: 'center' }).setLngLat([longitude, latitude]).addTo(map);
        map.flyTo({ center: [longitude, latitude], zoom: 13, duration: 1200 });
      } else {
        geolocMarker.setLngLat([longitude, latitude]);
      }
    }, err => { console.warn('Géoloc error', err); geolocActive = false; geoBtn.classList.remove('active'); }, { enableHighAccuracy: true });
  } else {
    geolocActive = false;
    geoBtn.classList.remove('active');
    if (watchId) navigator.geolocation.clearWatch(watchId);
    if (geolocMarker) { geolocMarker.remove(); geolocMarker = null; }
  }
});

document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

const scaleVal = document.getElementById('scale-val');
function updateScale() {
  const zoom = map.getZoom();
  const scales = { 7: '1:1M', 8: '1:500k', 9: '1:250k', 10: '1:150k', 11: '1:75k', 12: '1:40k', 13: '1:20k', 14: '1:10k', 15: '1:5k' };
  const rounded = Math.round(zoom);
  scaleVal.textContent = scales[rounded] || 'Z' + zoom.toFixed(1);
}
map.on('zoom', updateScale);
map.on('load', () => { updateScale(); rerender(); });

// Init
renderPanel();
