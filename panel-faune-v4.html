<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>panel_faune v4</title>
<style>
  @font-face { font-family:'VG5000'; font-display:swap;
    src:url('fonts/VG5000-Regular_web.ttf') format('truetype'),
        url('https://cdn.velvetyne.fr/fonts/vg5000/VG5000-Regular.woff2') format('woff2'); }
  body { margin:0; background:#222; padding:20px; box-sizing:border-box; font-family:'VG5000',monospace; }
  .panel { position:relative; width:1242px; height:1073px;
    background:url('assets/ui/panel-faune-v4-plate.png') 0 0 / 1242px 1073px no-repeat;
    transform:scale(var(--s,1)); transform-origin:top left; }
  .hit { position:absolute; background:transparent; border:0; cursor:pointer; padding:0; }
  .klabel { position:absolute; color:#e6e6e2; font-size:23px; pointer-events:none; letter-spacing:.02em; }
  .klabel.on { color:#fff; }
  #screen { position:absolute; border-radius:30px; }
</style></head><body>
<div class="panel" id="panel">
  <canvas id="screen"></canvas>
</div>
<script src="buttons-v4.js"></script>
<script>
// ── écran LCD (grille 7px) ───────────────────────────────────────────────────
const SCREEN={x:96,y:247,w:474,h:600};
const CELL=7, GRID_BG='#aeb8c0', GRID_LN='#ccd2d6', INK='#141414', INK2='#3a3a3a';
// sprites pixel : 1/2 = noir/gris foncé (encre), 0 = vide (grille visible)
const SPR = {
  cerf:[".1.....1.",".111.111.","...1.1...","..11111..",".1122211.",".1222221.",".1222221.","..1...1..","..1...1.."],
  sanglier:[".........",".1111111.","112222211","122222221","122222211",".1.11.1..",".1.11.1.."],
  oiseau:["...111...","..12221..",".1222211.","122222111",".1222221.","..12111..","...1.1..."],
  chouette:[".1.....1.",".11...11.",".1212121.",".1222221.",".1211121.",".1222221.","..12221..","..1...1.."],
  serpent:["...11111.","..1....1.","..1.111..",".11.1....",".1..1.111",".1..12221",".111....."],
  lezard:[".11......","1221.....",".12211...","112222111",".12222221",".1.1..1.1"],
  papillon:[".1.....1.","11.1.1.11","122111221",".1221221.","..12221..","...1.1..."],
  scarabee:[".1.....1.","..12221..",".1222221.","112222211",".1222221.","112222211",".1.....1."],
};
const KINDS=[
  {id:'mammiferes',label:'Mammifères',an:['cerf','sanglier']},
  {id:'oiseaux',   label:'Oiseaux',   an:['oiseau','chouette']},
  {id:'reptiles',  label:'Reptiles',  an:['serpent','lezard']},
  {id:'insectes',  label:'Insectes',  an:['papillon','scarabee']},
];
const KY=[468,579,686,797], KX=778, KW=280, KH=75;
const MAIN={x:888,y:255,w:150,h:150};
let kind='mammiferes', active=false;

const panel=document.getElementById('panel');
const cv=document.getElementById('screen');
Object.assign(cv.style,{left:SCREEN.x+'px',top:SCREEN.y+'px',width:SCREEN.w+'px',height:SCREEN.h+'px'});
cv.width=SCREEN.w; cv.height=SCREEN.h;
const ctx=cv.getContext('2d');

function drawScreen(){
  const cols=Math.floor(SCREEN.w/CELL), rows=Math.floor(SCREEN.h/CELL);
  // grille LCD
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    ctx.fillStyle=GRID_BG; ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
    ctx.strokeStyle=GRID_LN; ctx.lineWidth=0.5; ctx.strokeRect(x*CELL+.25,y*CELL+.25,CELL-.5,CELL-.5);
  }
  // animaux (pixels noirs) — 3 colonnes, répétés pour remplir façon dex
  const list=KINDS.find(k=>k.id===kind).an;
  const PITCH=18, M=4, perRow=Math.floor((cols-M)/PITCH), maxRows=Math.floor((rows-M)/PITCH);
  let i=0;
  for(let r=0;r<maxRows;r++)for(let c=0;c<perRow;c++){
    const g=SPR[list[i%list.length]]; i++;
    const ox=M+c*PITCH, oy=M+r*PITCH;
    for(let py=0;py<g.length;py++)for(let px=0;px<g[py].length;px++){
      const v=g[py][px]; if(v==='0'||v===' '||v==='.')continue;
      ctx.fillStyle=(v==='2')?INK2:INK;
      ctx.fillRect((ox+px)*CELL,(oy+py)*CELL,CELL,CELL);
    }
  }
}
function render(){
  drawScreen();
  [...panel.querySelectorAll('.v4btn')].forEach(e=>e.remove());
  // top-bar pills
  makeButton(panel,{type:'minmax',x:79,y:120});
  makeButton(panel,{type:'search',x:249,y:118});
  // gros bouton : activer faune sur la carte (touche orange quand actif)
  makeButton(panel,{type:'key',x:MAIN.x,y:MAIN.y,on:active,onClick:()=>{active=!active;render();}});
  // 4 types d'animaux (longs boutons)
  KINDS.forEach((k,i)=>makeButton(panel,{type:'kind',x:KX,y:KY[i],label:k.label,on:k.id===kind,
    onClick:()=>{kind=k.id;render();}}));
}
render();
const fit=()=>panel.style.setProperty('--s',Math.min(1,(innerWidth-40)/1242,(innerHeight-40)/1073).toFixed(3));
addEventListener('resize',fit);fit();
</script></body></html>
