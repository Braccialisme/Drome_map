name = "drome-commu"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# Durable Object = une "salle" (groupe d'amis) par code PIN. Tient la liste des
# membres connectés + leur position live + les points partagés, broadcast en WS.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_classes = ["Room"]

# KV : réserve les codes PIN (évite les collisions entre groupes) + stocke le
# dernier snapshot d'une salle (points partagés) pour survie au redémarrage du DO.
[[kv_namespaces]]
binding = "PINS"
id = "REMPLIR_APRES_wrangler_kv_namespace_create"
